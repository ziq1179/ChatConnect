kind = "web"
previewPath = "/"
title = "Messaging App"
version = "1.0.0"
id = "artifacts/messaging-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25007
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/messaging-app run dev"

[services.env]
PORT = "25007"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/messaging-app", "run", "build"]
publicDir = "artifacts/messaging-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
