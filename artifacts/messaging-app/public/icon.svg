<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ede9fe;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Main chat bubble -->
  <path d="M130 160 Q130 120 170 120 L342 120 Q382 120 382 160 L382 270 Q382 310 342 310 L270 310 L230 360 L230 310 L170 310 Q130 310 130 270 Z"
        fill="url(#bubble)"/>

  <!-- Small second bubble (implies conversation) -->
  <path d="M180 340 Q180 315 200 315 L310 315 Q330 315 330 340 L330 390 Q330 415 310 415 L256 415 L236 438 L236 415 L200 415 Q180 415 180 390 Z"
        fill="white" opacity="0.55"/>

  <!-- Dots in main bubble -->
  <circle cx="200" cy="215" r="18" fill="#7c3aed"/>
  <circle cx="256" cy="215" r="18" fill="#7c3aed"/>
  <circle cx="312" cy="215" r="18" fill="#7c3aed"/>
</svg>
